<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#B10008"/>
      <stop offset="0.18" stop-color="#F40009"/>
      <stop offset="0.5"  stop-color="#FF3038"/>
      <stop offset="0.82" stop-color="#F40009"/>
      <stop offset="1"    stop-color="#B10008"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#8b9199"/>
      <stop offset="0.5" stop-color="#eef1f4"/>
      <stop offset="1"   stop-color="#8b9199"/>
    </linearGradient>
    <clipPath id="canClip">
      <path d="M8 7 h16 a1 1 0 0 1 1 1 v18 a3 3 0 0 1 -3 3 h-12 a3 3 0 0 1 -3 -3 v-18 a1 1 0 0 1 1 -1 z"/>
    </clipPath>
  </defs>

  <!-- can body -->
  <path d="M8 7 h16 a1 1 0 0 1 1 1 v18 a3 3 0 0 1 -3 3 h-12 a3 3 0 0 1 -3 -3 v-18 a1 1 0 0 1 1 -1 z" fill="url(#body)"/>

  <!-- white Coca-Cola style wave band -->
  <g clip-path="url(#canClip)">
    <path d="M5 17 q4 -3 8 -1 t8 -1 t8 -1 v6 q-4 3 -8 1 t-8 1 t-8 1 z" fill="#ffffff"/>
    <path d="M5 16.5 q4 -3 8 -1 t8 -1 t8 -1" fill="none" stroke="#B10008" stroke-width="0.6" opacity="0.35"/>
  </g>

  <!-- top rim / metal lid -->
  <ellipse cx="16" cy="7" rx="8.6" ry="2.3" fill="url(#metal)"/>
  <ellipse cx="16" cy="6.4" rx="7" ry="1.6" fill="#c9ced4"/>
  <!-- pull tab -->
  <rect x="14.2" y="5.6" width="3.6" height="1.6" rx="0.8" fill="#9aa0a7"/>
  <circle cx="16" cy="6.4" r="0.7" fill="#7d838a"/>

  <!-- subtle side highlight -->
  <rect x="10" y="8" width="1.6" height="20" rx="0.8" fill="#ffffff" opacity="0.18" clip-path="url(#canClip)"/>
</svg>
